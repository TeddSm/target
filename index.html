<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Anna Stepaniuk - Допомагаю б'юті бізнесам та експертам</title>
  </head>
  <body>
    <header></header>
    <main>
      <section class="hero">
        <div class="container">
          <div class="hero-text-container">
            <span class="hero-name">Anna Stepaniuk ✱</span>
            <h1 class="hero-title">
              Допомагаю<br />
              б'юті бізнесам<br />
              та <br />експертам
            </h1>
            <h2 class="hero-text-right">
              → <br />отримувати стабільних клієнтів
            </h2>
            <h2 class="hero-text-left">
              <span class="hero-icon">✱</span
              ><span class="hero-aftertext">
                → <br />збільшувати дохід та масштабуватися</span
              >
            </h2>
          </div>
        </div>
      </section>
      <section class="about">
        <div class="container">
          <h2 class="about-title">
            <span class="about-icon">✱</span>
            5 форматів співпраці
            <br /><span class="about-title-aftertext">На будь-який запит</span>
          </h2>
        </div>
      </section>
      <section class="order-form">
        <div class="container">
          <form class="contact-form" id="lead-form">
            <h2 class="form-title">ЗАЛИШИТИ ЗАЯВКУ</h2>
            <div class="form-group">
              <label for="name">Ім'я*</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Як до вас звертатися"
                required
              />
            </div>
            <div class="form-group">
              <label for="contact">@нік в Telegram / номер телефону*</label>
              <input
                type="text"
                id="contact"
                name="contact"
                placeholder="Месенджер / номер телефону"
                required
              />
            </div>
            <div class="form-group">
              <label for="niche">Ніша*</label>
              <input
                type="text"
                id="niche"
                name="niche"
                placeholder="Бʼюті бізнес, експерт, інша ніша ..."
                required
              />
            </div>
            <div class="form-group">
              <label for="instagram">Профіль Instagram</label>
              <input
                type="text"
                id="instagram"
                name="instagram"
                placeholder="Посилання Instagram"
              />
            </div>
            <button type="submit" class="submit-btn">
              Хочу безкоштовну консультацію
            </button>
            <p class="form-note">
              Натискаючи кнопку «Хочу безкоштовну консультацію», ви погоджуєтесь
              з Політикою конфіденційності
            </p>
          </form>
        </div>
      </section>
    </main>
    <footer></footer>
    <script src="./js/script.js"></script>
  </body>
</html>
